<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>深度能量解盘</title>
  <style>
    /* ================= 全局基础样式 ================= */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; background-color: #f7f7f7; }
    
    .container {
      width: 100%; height: 100%; padding: 20px;
      display: flex; flex-direction: column;
      transition: all 0.5s ease; /* 核心：中西式视觉丝滑平滑切换 */
      overflow-y: auto;
    }

    /* ================= 主题 3：首页默认极简温暖纸感 ================= */
    .theme-default { background-color: #f4ece1; color: #4a3e3d; }
    .welcome-title { font-size: 24px; font-weight: bold; text-align: center; margin-top: 40px; color: #3e2723; }
    .welcome-subtitle { font-size: 13px; text-align: center; color: #8d6e63; margin-bottom: 40px; margin-top: 8px; }
    
    .category-list { display: flex; flex-direction: column; gap: 20px; }
    .category-btn {
      background: #ffffff; border-radius: 12px; padding: 22px 20px;
      box-shadow: 0 4px 12px rgba(165, 140, 120, 0.15); cursor: pointer;
    }
    .theme-default .btn-title { font-size: 18px; font-weight: bold; color: #8c6239; display: block; margin-bottom: 6px; }
    .theme-default .btn-desc { font-size: 13px; color: #7a6e67; }

    /* ================= 主题 1：东方元素（玄青烫金） ================= */
    .theme-east { background-color: #0b1311; color: #d1c7bd; }
    .theme-east .status-bar { background: rgba(255,255,255,0.04); border: 1px solid rgba(212,175,55,0.2); }
    .theme-east .progress { background: #d4af37; } 
    .theme-east .user-msg { background: #162421; border-left: 4px solid #d4af37; color: #fff; }
    .theme-east .master-msg { background: #121e1b; border: 1px solid rgba(212,175,55,0.15); }
    .theme-east .master-tag { background: #d4af37; color: #0b1311; font-weight: bold; }
    /* 东方饰品高亮颜色：玉石绿 */
    .theme-east .highlight-ornament { color: #26da9f !important; font-weight: bold; text-decoration: underline; cursor: pointer; padding: 0 4px; }

    /* ================= 主题 2：西方元素（午夜蓝星光） ================= */
    .theme-west { background-color: #0a0e1a; color: #cbd5e1; }
    .theme-west .status-bar { background: rgba(255,255,255,0.03); border: 1px solid rgba(168,85,247,0.3); }
    .theme-west .progress { background: #a855f7; } 
    .theme-west .user-msg { background: #131a30; border-left: 4px solid #a855f7; color: #fff; }
    .theme-west .master-msg { background: #0f1626; border: 1px solid rgba(168,85,247,0.2); }
    .theme-west .master-tag { background: linear-gradient(135deg, #a855f7, #6366f1); color: #ffffff; }
    /* 西方饰品高亮颜色：极光星云粉 */
    .theme-west .highlight-ornament { color: #ff79c6 !important; font-weight: bold; text-shadow: 0 0 8px rgba(255,121,198,0.6); text-decoration: underline; cursor: pointer; padding: 0 4px; }

    /* ================= 公共问答与数据面板样式 ================= */
    .status-bar { padding: 12px; border-radius: 8px; margin-bottom: 20px; }
    .status-item { display: flex; align-items: center; margin-bottom: 6px; font-size: 12px; }
    .progress-bar { flex: 1; height: 6px; background: rgba(0,0,0,0.1); margin: 0 10px; border-radius: 3px; overflow: hidden; }
    .progress { height: 100%; transition: width 0.6s ease; }

    .chat-section { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .history-scroll { flex: 1; overflow-y: auto; padding-right: 4px; margin-bottom: 15px; }
    .msg-box { padding: 15px; border-radius: 8px; margin-bottom: 15px; font-size: 15px; line-height: 1.6; animation: fadeIn 0.3s ease-in-out; }
    .master-tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; margin-bottom: 8px; letter-spacing: 1px; }

    .question-selector { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 12px; border: 1px solid rgba(255,255,255,0.1); }
    .section-title { font-size: 13px; color: #94a3b8; margin-bottom: 10px; }
    .q-item {
      background: rgba(255,255,255,0.08); padding: 14px 12px; border-radius: 8px;
      margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer;
    }
    .q-text { font-size: 14px; flex: 1; }
    .arrow { color: #64748b; font-size: 12px; margin-left: 5px; }

    /* ================= 企微优惠券拦截弹窗 ================= */
    .pop-mask { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 999; display: none; }
    .coupon-pop-card { width: 85%; max-width: 340px; background: #ffffff; border-radius: 16px; padding: 25px 20px; text-align: center; color: #333333; animation: scaleUp 0.3s ease; }
    .pop-header { font-size: 18px; font-weight: bold; color: #e11d48; margin-bottom: 15px; }
    .pop-tip { font-size: 14px; color: #4b5563; }
    .coupon-badge { background: #ffe4e6; color: #e11d48; font-size: 20px; font-weight: bold; padding: 10px 20px; display: inline-block; margin: 12px 0; border-radius: 6px; border: 2px dashed #e11d48; }
    .pop-sub { font-size: 12px; color: #6b7280; display: block; margin-bottom: 15px; line-height: 1.4; }
    .qr-placeholder { width: 140px; height: 140px; background: #f3f4f6; margin: 10px auto 20px; display: flex; align-items: center; justify-content: center; border: 1px solid #e5e7eb; font-size: 12px; color: #9ca3af; font-weight: bold; }
    .btn-primary { background: #e11d48; color: #fff; border: none; width: 100%; border-radius: 25px; font-size: 15px; padding: 12px 0; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(225,29,72,0.3); }
    .btn-close { font-size: 13px; color: #9ca3af; margin-top: 15px; text-decoration: underline; cursor: pointer; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>

<div class="container theme-default" id="mainContainer">
  
  <div class="status-bar" id="statusBar" style="display: none;">
    <div class="status-item">
      <span>当前能量留存率</span>
      <div class="progress-bar"><div class="progress" style="width: 60%;"></div></div>
      <span>60%</span>
    </div>
    <div class="status-item">
      <span>决策盲区指数</span>
      <div class="progress-bar"><div class="progress" style="width: 55%;"></div></div>
      <span>55%</span>
    </div>
  </div>

  <div class="home-section" id="homeSection">
    <div class="welcome-title">深度能量解盘</div>
    <div class="welcome-subtitle">探寻隐藏在您命盘底层的核心轨迹</div>
    
    <div class="category-list">
      <div class="category-btn" onclick="selectCategory('fortune')">
        <span class="btn-title">【 财运 · 暗线 】</span>
        <span class="btn-desc">复核命盘盲区，看清偏财何时被激活</span>
      </div>
      <div class="category-btn" onclick="selectCategory('career')">
        <span class="btn-title">【 事业 · 转机 】</span>
        <span class="btn-desc">面临职场变动拉扯，坚守还是止损？</span>
      </div>
      <div class="category-btn" onclick="selectCategory('love')">
        <span class="btn-title">【 感情 · 正缘 】</span>
        <span class="btn-desc">测算正缘气场，认清当下是正缘还是消耗</span>
      </div>
    </div>
  </div>

  <div class="chat-section" id="chatSection" style="display: none;">
    <div class="history-scroll" id="historyScroll"></div>
    
    <div class="question-selector" id="questionSelector">
      <div class="section-title">💡 结构答疑（系统赠送 3 次免费机会，剩余 <span id="freeCountText">3</span> 次）</div>
      <div class="hook-questions" id="hookQuestions"></div>
    </div>
  </div>

  <div class="pop-mask" id="couponPop">
    <div class="coupon-pop-card">
      <div class="pop-header">🧧 检测到您是首次结缘 🧧</div>
      <div class="pop-body">
        <p class="pop-tip">添加专属主理人企业微信</p>
        <div class="coupon-badge">立领『满减优惠券』</div>
        <span class="pop-sub">并将免费获赠大师亲传的《饰品佩戴净化与纳财指南》</span>
        
        <div class="qr-placeholder">[ 放入企业微信二维码 ]</div>
      </div>
      <div class="pop-footer">
        <button class="btn-primary" onclick="goToShopping()">已加企微，前往请饰</button>
        <div class="btn-close" onclick="closePop()">暂不需要</div>
      </div>
    </div>
  </div>

</div>

<script>
  // ================= 核心大白话心理问答数据库 =================
  const QA_DATABASE = {
    fortune: {
      theme: 'east', tag: '天机开示',
      questions: [
        { id: 'f1', level: 1, text: '为什么我总是存不下钱，手里一有点钱就莫名其妙花掉？' },
        { id: 'f2', level: 2, text: '那我什么时候会有财运，能真正赚到大钱？' },
        { id: 'f3', level: 3, text: '在财运来临之前，我当下最需要调整的能量是什么？' }
      ],
      replies: {
        'f1': '从你的盘口信息来看，存不下钱是因为先天财库有磨损，能量传导的闭环不够。过去的流年里，你经常在为莫名其妙的突发开销买单。但这并非你不够努力，而是你正处于资源断舍离的拉扯节点。',
        'f2': '经过精准复核，明后年你的流年气场会迎来一次强烈的上扬，隐藏的“偏财暗线”将被激活！但由于你当前的决策盲区指数较高，若不提前做能量疏导，好运来时也很难守住。',
        'f3': '你当下最需要调整的就是“财库的开口”。除了心态上要克制，最有效的办法是借助外物锁紧财库。建议随身配一串 <span class="highlight-ornament" onclick="triggerPop(event)">【路路通玉髓】</span>。能量场这东西，不求瞬间大富大贵，先帮你把漏钱的窟窿堵上，财才能聚得起来。'
      }
    },
    career: {
      theme: 'east', tag: '天机开示',
      questions: [
        { id: 'c1', level: 1, text: '为什么我最近工作总是有劲使不出，频繁精神内耗？' },
        { id: 'c2', level: 2, text: '那我什么时候能换个好工作，或者事业迎来转机？' },
        { id: 'c3', level: 3, text: '如果我想在接下来的转机里跳槽或升职，我最该注意避开什么坑？' }
      ],
      replies: {
        'c1': '流年气场正在逼迫你面对关于资源断舍离的课题。你在一个长久依赖的路径上面临失效，这引发了间歇性的精神内耗，把你性格最底层长期被压抑的真实诉求逼了出来。',
        'c2': '下半年XX月份你的盘面会冲开现有的压制，出现极佳的转换赛道或升迁时机。但盲目跳槽容易踩入更大的内耗陷阱，必须稳住底层能量。',
        'c3': '避坑的关键在于稳固你当下的气场，防范小人作祟。建议在转机到来前，贴身带一件 <span class="highlight-ornament" onclick="triggerPop(event)">【黑曜御守】</span> 来帮你收拢心神、挡掉杂质。准备好这两点，这次转型就能稳操胜券。'
      }
    },
    love: {
      theme: 'west', tag: '神谕启示',
      questions: [
        { id: 'l1', level: 1, text: '为什么我总是遇到渣男/渣女，在感情里一直被消耗？' },
        { id: 'l2', level: 2, text: '那我真正能结婚的正缘什么时候才会出现？' },
        { id: 'l3', level: 3, text: '我未来的这个正缘，具有什么样的外在特征或者性格？' }
      ],
      replies: {
        'l1': '宇宙的力量正在放大你的情感潜意识。你之所以频繁陷入消耗型关系，是因为你星盘里的亲密关系课题存在创伤，导致你天然容易被带有欺骗或幻象的气场吸引。',
        'l2': '当明年金星与木星形成完美相位时，你的桃花磁场将被彻底洗牌，真正属于你的正缘周期就会开启。但在此之前，必须清理干净你身边的负面能量残留。',
        'l3': '对方大概率是个性格沉稳、带点书卷气的人。不过你现在的桃花磁场被烂桃花堵住了，如果想加速让他感知到你，可以尝试借用 <span class="highlight-ornament" onclick="triggerPop(event)">【草莓晶蜜恋锁】</span> 的磁场去清理掉身边的杂质，加速显化正缘。'
      }
    }
  };

  let currentCat = '';
  let freeCount = 3;

  // 1. 首页选择分类并完成丝滑换肤
  function selectCategory(cat) {
    currentCat = cat;
    const catData = QA_DATABASE[cat];
    
    document.getElementById('mainContainer').className = 'container theme-' + catData.theme;
    document.getElementById('homeSection').style.display = 'none';
    document.getElementById('statusBar').style.display = 'block';
    document.getElementById('chatSection').style.display = 'flex';
    
    renderQuestions(1, 2); // 优先渲染前两个大白话问题
  }

  // 动态按钮队列渲染
  function renderQuestions(minLvl, maxLvl) {
    const catData = QA_DATABASE[currentCat];
    const qContainer = document.getElementById('hookQuestions');
    qContainer.innerHTML = '';
    
    const filtered = catData.questions.filter(q => q.level >= minLvl && q.level <= maxLvl);
    
    filtered.forEach(q => {
      const div = document.createElement('div');
      div.className = 'q-item';
      div.onclick = () => askQuestion(q.id, q.text);
      div.innerHTML = `<span class="q-text">${q.text}</span><span class="arrow">➔</span>`;
      qContainer.appendChild(div);
    });
  }

  // 2. 对话流程与次数控制
  function askQuestion(id, text) {
    if (freeCount <= 0) return;
    
    const catData = QA_DATABASE[currentCat];
    const scrollArea = document.getElementById('historyScroll');
    
    // 用户气泡卡片
    const userDiv = document.createElement('div');
    userDiv.className = 'msg-box user-msg';
    userDiv.innerText = '问：' + text;
    scrollArea.appendChild(userDiv);
    
    // 大师解析文本（无痕塞入饰品）
    const masterDiv = document.createElement('div');
    masterDiv.className = 'msg-box master-msg';
    masterDiv.innerHTML = `<div class="master-tag">${catData.tag}</div><div>${catData.replies[id]}</div>`;
    scrollArea.appendChild(masterDiv);
    
    scrollArea.scrollTop = scrollArea.scrollHeight;
    
    freeCount--;
    document.getElementById('freeCountText').innerText = freeCount;
    
    // 完美的3次递进：还剩 1 次免费时，自动将最后的第 3 个不暴露意图的问题顶上去
    if (freeCount === 1) {
      renderQuestions(3, 3);
    } else if (freeCount === 0) {
      document.getElementById('questionSelector').style.display = 'none';
    }
  }

  // 3. 拦截高亮文字点击，拉起企微弹窗
  function triggerPop(event) {
    event.stopPropagation(); // 阻止多余的事件传播
    document.getElementById('couponPop').style.display = 'flex';
  }

  function closePop() {
    document.getElementById('couponPop').style.display = 'none';
  }

  function goToShopping() {
    closePop();
    alert('正在拉起外部跳转，前往你的货品请饰小程序页面...');
  }
</script>
</body>
</html>
