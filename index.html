<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>命理解读</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;900&family=Noto+Sans+SC:wght@300;400;500&display=swap');
:root{--bg:#0E0E12;--surface:#16161C;--surface2:#1E1E26;--border:rgba(255,255,255,0.07);--text:#E8E4DC;--text-dim:rgba(232,228,220,0.5);--red:#C9352A;--red-dim:rgba(201,53,42,0.15);--gold:#C9961A;--gold-dim:rgba(201,150,26,0.15);--taro:#7B5EA7;--taro-dim:rgba(123,94,167,0.15);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.screen{width:100%;max-width:520px;display:none;animation:fadeUp 0.4s ease;}
.screen.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.eyebrow{font-size:11px;letter-spacing:0.2em;color:var(--text-dim);text-transform:uppercase;margin-bottom:10px;}
.title{font-family:'Noto Serif SC',serif;font-weight:900;font-size:clamp(26px,6vw,36px);line-height:1.2;margin-bottom:6px;}
.subtitle{font-size:13px;color:var(--text-dim);margin-bottom:28px;line-height:1.6;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:11px;letter-spacing:0.1em;color:var(--text-dim);}
.field input,.field select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:6px;font-size:15px;font-family:'Noto Sans SC',sans-serif;width:100%;transition:border-color 0.15s;}
.field input:focus,.field select:focus{outline:none;border-color:var(--gold);}
.gender-row{display:flex;gap:10px;margin-bottom:20px;}
.gender-btn{flex:1;padding:12px;text-align:center;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:14px;background:var(--surface);color:var(--text-dim);transition:all 0.15s;}
.gender-btn.active{background:var(--red-dim);border-color:var(--red);color:var(--text);}
.btn{width:100%;padding:15px;border:none;border-radius:6px;font-size:15px;font-family:'Noto Serif SC',serif;font-weight:600;letter-spacing:0.08em;cursor:pointer;transition:opacity 0.15s;}
.btn:hover{opacity:0.85;}
.btn-red{background:var(--red);color:#fff;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-dim);margin-top:10px;}
.pillars-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;}
.pillar-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px 6px;text-align:center;}
.pillar-label{font-size:10px;color:var(--text-dim);letter-spacing:0.1em;margin-bottom:8px;}
.pillar-gan{font-family:'Noto Serif SC',serif;font-weight:900;font-size:26px;display:block;line-height:1.2;}
.pillar-zhi{font-family:'Noto Serif SC',serif;font-weight:700;font-size:24px;color:var(--red);display:block;line-height:1.2;}
.pillar-ss{font-size:10px;color:var(--text-dim);margin-top:6px;}
.info-row{display:flex;gap:10px;margin-bottom:20px;}
.info-chip{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px;text-align:center;}
.info-chip .val{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:700;color:var(--gold);}
.info-chip .lbl{font-size:10px;color:var(--text-dim);margin-top:4px;}
.strength-bar-wrap{margin-bottom:20px;}
.strength-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);margin-bottom:6px;}
.strength-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.strength-fill{height:100%;background:var(--red);border-radius:3px;transition:width 0.6s ease;}
.direction-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.direction-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px 16px;text-align:center;cursor:pointer;transition:all 0.15s;}
.direction-card:hover{border-color:var(--gold);background:var(--gold-dim);}
.direction-card.selected{border-color:var(--gold);background:var(--gold-dim);}
.direction-icon{font-size:28px;margin-bottom:8px;}
.direction-name{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:600;}
.direction-desc{font-size:11px;color:var(--text-dim);margin-top:4px;}
.style-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px;margin-bottom:20px;gap:4px;}
.style-btn{flex:1;padding:10px;text-align:center;border-radius:5px;cursor:pointer;font-size:13px;color:var(--text-dim);transition:all 0.15s;border:1px solid transparent;}
.style-btn.active-master{background:var(--red-dim);color:var(--text);border-color:var(--red);}
.style-btn.active-taro{background:var(--taro-dim);color:var(--text);border-color:var(--taro);}
.reading-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px;min-height:160px;line-height:1.9;font-size:14px;white-space:pre-wrap;}
.reading-box.master-style{border-color:var(--red);}
.reading-box.taro-style{border-color:var(--taro);}
.loading-dots span{display:inline-block;animation:blink 1.2s infinite;color:var(--text-dim);}
.loading-dots span:nth-child(2){animation-delay:0.2s;}
.loading-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,80%,100%{opacity:0.2;}40%{opacity:1;}}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);cursor:pointer;margin-bottom:24px;transition:color 0.15s;}
.back-link:hover{color:var(--text);}
.error-msg{color:var(--red);font-size:13px;margin-top:10px;display:none;}
.dayun-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px;scrollbar-width:none;}
.dayun-item{min-width:64px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 6px;text-align:center;flex-shrink:0;font-size:11px;}
.dayun-item.current{border-color:var(--gold);background:var(--gold-dim);}
.dayun-item .dy-gz{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:700;}
.dayun-item .dy-age{color:var(--text-dim);margin-top:4px;}
</style>
</head>
<body>

<div class="screen active" id="screen1">
  <div class="eyebrow">八字命理</div>
  <div class="title">报上生辰，<br>好坏我都说</div>
  <div class="subtitle">基于天文历法精确排盘，不含糊，不绕弯</div>
  <div class="form-grid">
    <div class="field"><label>出生年</label><input type="number" id="inYear" placeholder="1990" min="1900" max="2100"></div>
    <div class="field"><label>出生月</label><input type="number" id="inMonth" placeholder="5" min="1" max="12"></div>
    <div class="field"><label>出生日</label><input type="number" id="inDay" placeholder="15" min="1" max="31"></div>
    <div class="field"><label>出生时间</label><input type="time" id="inTime" value="12:00"></div>
  </div>
  <div class="gender-row">
    <div class="gender-btn active" data-g="male">男</div>
    <div class="gender-btn" data-g="female">女</div>
  </div>
  <button class="btn btn-red" id="calcBtn">排 盘</button>
  <div class="error-msg" id="err1">请填写完整的出生年月日</div>
</div>

<div class="screen" id="screen2">
  <div class="back-link" onclick="goTo(1)">← 重新输入</div>
  <div class="eyebrow">排盘结果</div>
  <div class="title" id="s2title">命局一览</div>
  <div class="subtitle" id="s2sub"></div>
  <div class="pillars-grid" id="pillarsOut"></div>
  <div class="info-row">
    <div class="info-chip"><div class="val" id="strengthVal">—</div><div class="lbl">身强身弱</div></div>
    <div class="info-chip"><div class="val" id="liunianVal">—</div><div class="lbl">当前流年</div></div>
    <div class="info-chip"><div class="val" id="dayunVal">—</div><div class="lbl">当前大运</div></div>
  </div>
  <div class="strength-bar-wrap">
    <div class="strength-label"><span>帮身</span><span>耗泄</span></div>
    <div class="strength-bar"><div class="strength-fill" id="strengthFill" style="width:50%"></div></div>
  </div>
  <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px;letter-spacing:0.1em;">大运走势</div>
  <div class="dayun-scroll" id="dayunOut"></div>
  <button class="btn btn-red" onclick="goTo(3)">选择解读方向 →</button>
</div>

<div class="screen" id="screen3">
  <div class="back-link" onclick="goTo(2)">← 查看排盘</div>
  <div class="eyebrow">解读方向</div>
  <div class="title">你最想知道什么</div>
  <div class="subtitle">选一个，大师给你扒</div>
  <div class="direction-grid">
    <div class="direction-card" data-dir="财运" onclick="selectDir(this)"><div class="direction-icon">💰</div><div class="direction-name">财运</div><div class="direction-desc">钱从哪来，能不能存住</div></div>
    <div class="direction-card" data-dir="感情" onclick="selectDir(this)"><div class="direction-icon">❤️</div><div class="direction-name">感情</div><div class="direction-desc">桃花运势与感情走向</div></div>
    <div class="direction-card" data-dir="事业" onclick="selectDir(this)"><div class="direction-icon">⚡</div><div class="direction-name">事业</div><div class="direction-desc">适合什么路，近期顺不顺</div></div>
    <div class="direction-card" data-dir="整体运势" onclick="selectDir(this)"><div class="direction-icon">☯</div><div class="direction-name">整体运势</div><div class="direction-desc">命局全貌与当前大运</div></div>
  </div>
  <button class="btn btn-red" id="readBtn" onclick="goToReading()" disabled style="opacity:0.4">选一个方向继续</button>
</div>

<div class="screen" id="screen4">
  <div class="back-link" onclick="goTo(3)">← 换个方向</div>
  <div class="eyebrow" id="s4eyebrow">命理解读</div>
  <div class="title" id="s4title">—</div>
  <div class="style-toggle">
    <div class="style-btn active-master" id="styleMaster" onclick="switchStyle('master')">⚔️ 毒舌大师</div>
    <div class="style-btn" id="styleTaro" onclick="switchStyle('taro')">🌙 塔罗占星</div>
  </div>
  <div class="reading-box master-style" id="readingBox"><span class="loading-dots"><span>●</span><span>●</span><span>●</span></span></div>
  <button class="btn btn-outline" onclick="goTo(3)">换个方向</button>
  <button class="btn btn-outline" onclick="goTo(1)" style="margin-top:8px">重新排盘</button>
</div>

<script>
const SILICONFLOW_KEY='sk-hbfwihljzvxjujjqojamofhsqzafisiigrnnzctyzoogchcm';
const MODEL='deepseek-ai/DeepSeek-V3';

function julianDay(y,m,d,h,mi,s){let dd=d+(h+mi/60+s/3600)/24;if(m<=2){y--;m+=12;}const A=Math.floor(y/100),B=2-A+Math.floor(A/4);return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+dd+B-1524.5;}
function solarLon(jd){const T=(jd-2451545)/36525,L0=280.46646+36000.76983*T+0.0003032*T*T,M=357.52911+35999.05029*T-0.0001537*T*T,Mr=(M%360)*Math.PI/180,C=(1.914602-0.004817*T-0.000014*T*T)*Math.sin(Mr)+(0.019993-0.000101*T)*Math.sin(2*Mr)+0.000289*Math.sin(3*Mr),tl=L0+C,om=125.04-1934.136*T;return((tl-0.00569-0.00478*Math.sin(om*Math.PI/180))%360+360)%360;}
function findTermJD(yr,angle){const base=julianDay(yr,3,20,0,0,0);let ad=angle>180?angle-360:angle,lo=base+ad*365.2422/360-10,hi=lo+20;const dist=jd=>((solarLon(jd)-angle+540)%360)-180;for(let i=0;i<60;i++){const mid=(lo+hi)/2,d=dist(mid);if(Math.abs(d)<1e-7)break;(dist(lo)<0)==(d<0)?lo=mid:hi=mid;}return(lo+hi)/2;}
function jdToDate(jd){jd+=0.5;const Z=Math.floor(jd),F=jd-Z;let A=Z<2299161?Z:(()=>{const a=Math.floor((Z-1867216.25)/36524.25);return Z+1+a-Math.floor(a/4);})();const B=A+1524,C=Math.floor((B-122.1)/365.25),D=Math.floor(365.25*C),E=Math.floor((B-D)/30.6001),day=B-D-Math.floor(30.6001*E)+F,month=E<14?E-1:E-13,year=month>2?C-4716:C-4715,di=Math.floor(day),fr=day-di,hr=fr*24,h=Math.floor(hr),mn=(hr-h)*60,mi=Math.floor(mn);return new Date(Date.UTC(year,month-1,di,h,mi,0));}
function addH(d,h){return new Date(d.getTime()+h*3600000);}

const JIEQI=[["立春",315],["雨水",330],["惊蛰",345],["春分",0],["清明",15],["谷雨",30],["立夏",45],["小满",60],["芒种",75],["夏至",90],["小暑",105],["大暑",120],["立秋",135],["处暑",150],["白露",165],["秋分",180],["寒露",195],["霜降",210],["立冬",225],["小雪",240],["大雪",255],["冬至",270],["小寒",285],["大寒",300]];
const JIE=new Set(["立春","惊蛰","清明","立夏","芒种","小暑","立秋","白露","寒露","立冬","大雪","小寒"]);
const TG=["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
const DZ=["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
const WXGAN={甲:"木",乙:"木",丙:"火",丁:"火",戊:"土",己:"土",庚:"金",辛:"金",壬:"水",癸:"水"};
const WXZHI={子:"水",丑:"土",寅:"木",卯:"木",辰:"土",巳:"火",午:"火",未:"土",申:"金",酉:"金",戌:"土",亥:"水"};
const YYGAN={甲:1,乙:0,丙:1,丁:0,戊:1,己:0,庚:1,辛:0,壬:1,癸:0};
const HIDDEN={子:["癸"],丑:["己","癸","辛"],寅:["甲","丙","戊"],卯:["乙"],辰:["戊","乙","癸"],巳:["丙","戊","庚"],午:["丁","己"],未:["己","丁","乙"],申:["庚","壬","戊"],酉:["辛"],戌:["戊","辛","丁"],亥:["壬","甲"]};
const SHENG={木:"火",火:"土",土:"金",金:"水",水:"木"};
const KE={木:"土",土:"水",水:"火",火:"金",金:"木"};

function shishen(dg,g){if(g===dg)return"比肩";const dw=WXGAN[dg],ow=WXGAN[g],sy=YYGAN[dg]===YYGAN[g];if(ow===dw)return sy?"比肩":"劫财";if(SHENG[dw]===ow)return sy?"食神":"伤官";if(KE[dw]===ow)return sy?"偏财":"正财";if(KE[ow]===dw)return sy?"七杀":"正官";if(SHENG[ow]===dw)return sy?"偏印":"正印";return"?";}

function nearestJie(localDt){
  const jdNow=julianDay(localDt.getUTCFullYear(),localDt.getUTCMonth()+1,localDt.getUTCDate(),localDt.getUTCHours(),localDt.getUTCMinutes(),0)-8/24;
  let cands=[];
  for(const[n,a] of JIEQI){if(!JIE.has(n))continue;for(const yr of[localDt.getUTCFullYear()-1,localDt.getUTCFullYear(),localDt.getUTCFullYear()+1])cands.push([n,findTermJD(yr,a)]);}
  cands.sort((a,b)=>a[1]-b[1]);
  let prev=null,next=null;
  for(const[n,jd] of cands){if(jd<=jdNow)prev=[n,jd];else if(!next){next=[n,jd];break;}}
  return{prevName:prev[0],prevDate:addH(jdToDate(prev[1]),8),nextName:next[0],nextDate:addH(jdToDate(next[1]),8)};
}

const J2Z={立春:2,惊蛰:3,清明:4,立夏:5,芒种:6,小暑:7,立秋:8,白露:9,寒露:10,立冬:11,大雪:0,小寒:1};
const YSTART={0:2,5:2,1:4,6:4,2:6,7:6,3:8,8:8,4:0,9:0};
const ANCHOR=new Date(Date.UTC(2000,0,7));
let bazi=null,selectedDir=null,currentStyle='master',gender='male';

function goTo(n){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen'+n).classList.add('active');window.scrollTo(0,0);}

document.querySelectorAll('.gender-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.gender-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');gender=b.dataset.g;});});

function calcBazi(yr,mo,d,h,mi){
  const localDt=new Date(Date.UTC(yr,mo-1,d,h,mi,0));
  const dayCalc=h>=23?new Date(localDt.getTime()+86400000):localDt;
  const dIdx=((Math.round((new Date(Date.UTC(dayCalc.getUTCFullYear(),dayCalc.getUTCMonth(),dayCalc.getUTCDate()))-ANCHOR)/86400000)%60)+60)%60;
  const dayGan=TG[dIdx%10],dayZhi=DZ[dIdx%12];
  const hFrac=h+mi/60,zhiH=hFrac>=23||hFrac<1?0:Math.floor((hFrac+1)/2);
  const hrGan=TG[(YSTART[TG.indexOf(dayGan)]+zhiH)%10],hrZhi=DZ[zhiH];
  const lichunJd=findTermJD(yr,315),lichunDt=addH(jdToDate(lichunJd),8);
  const gyYear=localDt<lichunDt?yr-1:yr,gyOff=(((gyYear-1984)%60)+60)%60;
  const yrGan=TG[gyOff%10],yrZhi=DZ[gyOff%12];
  const{prevName,prevDate,nextName,nextDate}=nearestJie(localDt);
  const mZhiIdx=J2Z[prevName],mZhi=DZ[mZhiIdx];
  const mGan=TG[(YSTART[TG.indexOf(yrGan)]+(mZhiIdx-2+12)%12)%10];
  const scores={木:0,火:0,土:0,金:0,水:0};
  const pils=[[yrGan,yrZhi],[mGan,mZhi],[dayGan,dayZhi],[hrGan,hrZhi]];
  for(const[g,z] of pils){scores[WXGAN[g]]+=1;HIDDEN[z].forEach((hg,i)=>scores[WXGAN[hg]]+=[1,.5,.3][i]);}
  const dw=WXGAN[dayGan],swo=Object.keys(SHENG).find(k=>SHENG[k]===dw),keWo=Object.keys(KE).find(k=>KE[k]===dw);
  const help=scores[dw]+scores[swo],drain=scores[SHENG[dw]]+scores[KE[dw]]+(keWo?scores[keWo]:0);
  const ratio=help/(help+drain||1);
  const now=new Date(),nowLocal=new Date(Date.UTC(now.getFullYear(),now.getMonth(),now.getDate(),12,0,0));
  const lnJd=findTermJD(now.getFullYear(),315),lnDt=addH(jdToDate(lnJd),8);
  const lnYear=nowLocal<lnDt?now.getFullYear()-1:now.getFullYear(),lnOff=(((lnYear-1984)%60)+60)%60;
  const lnGan=TG[lnOff%10],lnZhi=DZ[lnOff%12];
  const yyang=YYGAN[yrGan],fwd=(yyang&&gender==='male')||(!yyang&&gender==='female');
  const diffDays=fwd?(nextDate-localDt)/86400000:(localDt-prevDate)/86400000,startAge=diffDays/3;
  const mgIdx=TG.indexOf(mGan),mzIdx=DZ.indexOf(mZhi);
  const dayun=[];
  for(let i=1;i<=8;i++){const gi=fwd?(mgIdx+i)%10:((mgIdx-i)%10+10)%10,zi=fwd?(mzIdx+i)%12:((mzIdx-i)%12+12)%12;dayun.push({gz:TG[gi]+DZ[zi],start:Math.round(startAge+(i-1)*10),end:Math.round(startAge+i*10)});}
  const age=now.getFullYear()-yr-(now.getMonth()+1<mo||(now.getMonth()+1===mo&&now.getDate()<d)?1:0);
  const curDayun=dayun.find(d=>age>=d.start&&age<d.end);
  return{pillars:[{label:"年柱",gan:yrGan,zhi:yrZhi,ss:shishen(dayGan,yrGan)},{label:"月柱",gan:mGan,zhi:mZhi,ss:shishen(dayGan,mGan)},{label:"日柱",gan:dayGan,zhi:dayZhi,ss:"日主"},{label:"时柱",gan:hrGan,zhi:hrZhi,ss:shishen(dayGan,hrGan)}],dayGan,strength:ratio>=.5?"身强":"身弱",ratio,liunian:lnGan+lnZhi,lnShishen:shishen(dayGan,lnGan),curDayun:curDayun?curDayun.gz:"—",dayunList:dayun,scores,dw,startAge:Math.round(startAge*10)/10,yr,mo,d};
}

document.getElementById('calcBtn').addEventListener('click',()=>{
  const yr=parseInt(document.getElementById('inYear').value),mo=parseInt(document.getElementById('inMonth').value),d=parseInt(document.getElementById('inDay').value);
  const[h,mi]=(document.getElementById('inTime').value||'12:00').split(':').map(Number);
  const err=document.getElementById('err1');
  if(!yr||!mo||!d||yr<1900||yr>2100||mo<1||mo>12||d<1||d>31){err.style.display='block';return;}
  err.style.display='none';
  bazi=calcBazi(yr,mo,d,h,mi);
  renderPillars();
  goTo(2);
});

function renderPillars(){
  const b=bazi;
  document.getElementById('s2title').textContent='日主'+b.dayGan+'（'+b.dw+'）';
  document.getElementById('s2sub').textContent=b.strength+' · 流年'+b.liunian+' '+b.lnShishen+' · 当前大运'+b.curDayun;
  document.getElementById('pillarsOut').innerHTML=b.pillars.map(p=>'<div class="pillar-card"><div class="pillar-label">'+p.label+'</div><span class="pillar-gan">'+p.gan+'</span><span class="pillar-zhi">'+p.zhi+'</span><div class="pillar-ss">'+p.ss+'</div></div>').join('');
  document.getElementById('strengthVal').textContent=b.strength;
  document.getElementById('liunianVal').textContent=b.liunian;
  document.getElementById('dayunVal').textContent=b.curDayun;
  document.getElementById('strengthFill').style.width=(b.ratio*100).toFixed(1)+'%';
  const now=new Date(),age=now.getFullYear()-b.yr-(now.getMonth()+1<b.mo||(now.getMonth()+1===b.mo&&now.getDate()<b.d)?1:0);
  document.getElementById('dayunOut').innerHTML=b.dayunList.map(d=>'<div class="dayun-item '+(age>=d.start&&age<d.end?'current':'')+'"><div class="dy-gz">'+d.gz+'</div><div class="dy-age">'+d.start+'-'+d.end+'</div></div>').join('');
}

function selectDir(el){
  document.querySelectorAll('.direction-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');selectedDir=el.dataset.dir;
  const btn=document.getElementById('readBtn');btn.disabled=false;btn.style.opacity='1';btn.textContent='看'+selectedDir+'解读 →';
}

function goToReading(){
  document.getElementById('s4eyebrow').textContent=selectedDir+' · 命理解读';
  document.getElementById('s4title').textContent=bazi.pillars[2].gan+bazi.pillars[2].zhi+' 日主';
  goTo(4);fetchReading();
}

function switchStyle(s){
  currentStyle=s;
  const box=document.getElementById('readingBox'),master=document.getElementById('styleMaster'),taro=document.getElementById('styleTaro');
  if(s==='master'){master.className='style-btn active-master';taro.className='style-btn';box.className='reading-box master-style';}
  else{taro.className='style-btn active-taro';master.className='style-btn';box.className='reading-box taro-style';}
  fetchReading();
}

async function fetchReading(){
  const box=document.getElementById('readingBox');
  box.innerHTML='<span class="loading-dots"><span>●</span><span>●</span><span>●</span></span>';
  const b=bazi;
  const pillarsText=b.pillars.map(p=>p.label+'：'+p.gan+p.zhi+'（'+p.ss+'）').join('，');
  const wxText=Object.entries(b.scores).map(([k,v])=>k+v.toFixed(1)).join(' ');
  const masterPrompt='你是一位游历多年的东方命理大师，直言不讳，好坏都说，不卖关子，嘴损但精准。看到什么说什么，不为了让人舒服打太极。毒舌对象是命格和选择，不是人身攻击。';
  const taroPrompt='你是塔罗占星师Luna，精通西方占星与命理，说话优雅克制，善用比喻，不下绝对断言，但会直说趋势和风险。';
  const sysPrompt=currentStyle==='master'?masterPrompt:taroPrompt;
  const userPrompt='用户八字排盘数据如下：\n'+pillarsText+'\n日主五行：'+b.dw+'，'+b.strength+'（帮身占比'+Math.round(b.ratio*100)+'%）\n五行分布：'+wxText+'\n当前流年：'+b.liunian+'（天干十神：'+b.lnShishen+'）\n当前大运：'+b.curDayun+'\n\n请针对【'+selectedDir+'】方向，结合以上真实排盘数据，给出300字以内的具体解读。不要重复罗列数字，直接用命理逻辑讲清楚对这个人'+selectedDir+'的影响、现阶段的机会或风险、以及一句具体建议。';
  try{
    const resp=await fetch('https://api.siliconflow.cn/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SILICONFLOW_KEY},body:JSON.stringify({model:MODEL,stream:true,max_tokens:600,messages:[{role:'system',content:sysPrompt},{role:'user',content:userPrompt}]})});
    if(!resp.ok){box.textContent='网络错误，请稍后重试（'+resp.status+'）';return;}
    const reader=resp.body.getReader(),dec=new TextDecoder();
    let text='';box.textContent='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      for(const line of dec.decode(value,{stream:true}).split('\n')){
        if(!line.startsWith('data:'))continue;const data=line.slice(5).trim();if(data==='[DONE]')break;
        try{const j=JSON.parse(data),delta=j.choices?.[0]?.delta?.content||'';text+=delta;box.textContent=text;}catch{}
      }
    }
  }catch(e){box.textContent='请求失败：'+e.message;}
}
</script>
