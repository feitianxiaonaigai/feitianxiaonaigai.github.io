<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI命理系统</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  transition: 0.3s;
  background: #0f172a;
  color: white;
}

header {
  padding: 16px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.container {
  padding: 16px;
}

.card {
  background: rgba(255,255,255,0.08);
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 12px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  margin: 5px;
  cursor: pointer;
}

.primary { background: #3b82f6; color: white; }
.gold { background: #fbbf24; }
.red { background: #ef4444; color: white; }
.green { background: #22c55e; color: white; }

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
}

.chat {
  height: 220px;
  overflow-y: auto;
  background: rgba(0,0,0,0.3);
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.msg {
  margin: 6px 0;
}

.me { color: #60a5fa; }
.ai { color: #fbbf24; }

/* 五行主题 */
.water { background:#0a1a3a; }
.fire { background:#3a0a0a; }
.wood { background:#0a3a1a; }
.metal { background:#1a1a1a; }
.earth { background:#3a2a0a; }
</style>
</head>

<body>

<header>🔮 AI命理系统</header>

<div class="container">

  <div class="card">
    <div>选择模式</div>
    <select id="mode">
      <option value="bazi">八字命理</option>
      <option value="tarot">塔罗占卜</option>
    </select>

    <input id="input" placeholder="输入你的问题，比如：我今天运势如何"/>
    <button class="primary" onclick="askAI()">开始测算</button>
  </div>

  <div class="card">
    <div id="chat" class="chat"></div>
  </div>

  <div class="card">
    <button class="green" onclick="shareAdd()">📤 分享好友+1次数</button>
    <div>剩余次数：<span id="count">0</span></div>
  </div>

  <div class="card">
    <button class="gold" onclick="buy9()">9.9次数卡</button>
    <button class="gold" onclick="buy19()">19.9运势+穿搭</button>
    <button class="red" onclick="buy128()">128深度报告</button>
  </div>

</div>

<script>
let freeUsed = localStorage.getItem("freeUsed") || 0;
let count = parseInt(localStorage.getItem("count") || "1");

document.getElementById("count").innerText = count;

function addMsg(text, type){
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
}

function askAI(){
  let input = document.getElementById("input").value;
  let mode = document.getElementById("mode").value;

  if(count <= 0){
    addMsg("次数不足，请购买套餐", "ai");
    return;
  }

  count--;
  localStorage.setItem("count", count);
  document.getElementById("count").innerText = count;

  addMsg("你：" + input, "me");

  let reply = generateAI(input, mode);
  addMsg("AI：" + reply, "ai");

  setTheme();
}

function generateAI(text, mode){
  if(mode === "bazi"){
    return "缘主，根据你的八字气场来看，目前处于转折期，建议稳中求进，避免冲动决策。";
  } else {
    return "塔罗显示：你当前能量偏向犹豫，但未来3天会出现关键机会。";
  }
}

function shareAdd(){
  count++;
  localStorage.setItem("count", count);
  document.getElementById("count").innerText = count;
  alert("分享成功 +1次数（模拟）");
}

function buy9(){
  alert("跳转支付：9.9套餐（这里接支付链接）");
}

function buy19(){
  alert("跳转支付：19.9订阅（每日运势+穿搭）");
}

function buy128(){
  alert("跳转支付：128深度报告（高客单入口）");
}

function setTheme(){
  let t = ["water","fire","wood","metal","earth"];
  let pick = t[Math.floor(Math.random()*t.length)];
  document.body.className = pick;
}

/* 首次进入免费1次 */
if(!localStorage.getItem("init")){
  localStorage.setItem("init", "1");
  localStorage.setItem("count", "1");
}
</script>

</body>
</html>
