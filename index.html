<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>灵犀命盘 · 五行系统</title>

<style>
/* ======================
基础样式
====================== */
body {
margin:0;
font-family: "PingFang SC", sans-serif;
color:white;
transition:1s;
background:#05060f;
}

.page {
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.page.active {
display:flex;
}

h1, h2 {
text-align:center;
letter-spacing:2px;
}

/* ======================
按钮
====================== */
button {
padding:12px 28px;
border-radius:25px;
border:1px solid rgba(255,255,255,0.3);
background:transparent;
color:white;
cursor:pointer;
margin-top:20px;
transition:0.3s;
}

button:hover {
transform:scale(1.05);
background:rgba(255,255,255,0.1);
}

/* ======================
输入框
====================== */
input {
padding:12px 18px;
width:280px;
border-radius:10px;
border:none;
outline:none;
margin-top:20px;
}

/* ======================
五行主题
====================== */

/* 🌊 水 */
body.water {
background: radial-gradient(circle at top, #0a1a3a, #02040a);
}

/* 🌳 木 */
body.wood {
background: radial-gradient(circle at top, #0f3d1e, #020a05);
}

/* 🔥 火 */
body.fire {
background: radial-gradient(circle at top, #3a0a0a, #0a0202);
}

/* 🪨 土 */
body.earth {
background: radial-gradient(circle at top, #3a2f1a, #0a0805);
}

/* ⚡ 金 */
body.metal {
background: radial-gradient(circle at top, #2a2f3a, #05070a);
}

/* ======================
卡片
====================== */
.card {
padding:20px 40px;
border:1px solid rgba(255,255,255,0.2);
border-radius:15px;
cursor:pointer;
margin:10px;
transition:0.3s;
}

.card:hover {
transform:translateY(-6px);
box-shadow:0 0 20px rgba(255,255,255,0.1);
}
</style>

</head>

<body>

<!-- ================= 首页 ================= -->
<div class="page active" id="home">
<h1>灵犀命盘</h1>
<button onclick="go('select')">进入系统</button>
</div>

<!-- ================= 选择页 ================= -->
<div class="page" id="select">
<h2>选择功能</h2>

<div style="display:flex;">
<div class="card" onclick="go('bazi')">八字命盘</div>
<div class="card" onclick="alert('塔罗功能开发中')">塔罗系统</div>
</div>

</div>

<!-- ================= 八字页 ================= -->
<div class="page" id="bazi">

<h2>八字五行推演</h2>

<input id="birth" placeholder="输入八字，例如：癸酉 己未 甲子" />

<button onclick="analyze()">开始推演</button>

</div>

<script>

/* ================= 页面切换 ================= */
function go(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* ================= 五行分析核心 ================= */
function analyze(){
const text = document.getElementById("birth").value;

let type = "";

/* 水 */
if(text.includes("癸") || text.includes("壬")){
type = "water";
}

/* 木 */
else if(text.includes("甲") || text.includes("乙")){
type = "wood";
}

/* 火 */
else if(text.includes("丙") || text.includes("丁")){
type = "fire";
}

/* 土 */
else if(text.includes("戊") || text.includes("己")){
type = "earth";
}

/* 金 */
else if(text.includes("庚") || text.includes("辛")){
type = "metal";
}

/* 应用主题 */
document.body.className = type;
}

</script>

</body>
</html>
